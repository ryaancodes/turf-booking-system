<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Turf It Up</title>

<link rel="stylesheet" href="style.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Outfit',sans-serif;
  background:#0b1220;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.payment-box{
  background:#111827;
  border:1px solid #1f2937;
  padding:35px;
  border-radius:24px;
  max-width:550px;
  width:100%;
  box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.payment-box h1{
  text-align:center;
  color:#00ffc3;
  margin-bottom:25px;
  font-size:2rem;
}

#paymentDetails{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.detail-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 16px;
  background:#1f2937;
  border-radius:12px;
}

.detail-label{
  color:#94a3b8;
}

.detail-value{
  color:white;
  font-weight:600;
}

.total-box{
  margin:25px 0;
  text-align:center;
  padding:20px;
  border-radius:16px;
  background:rgba(0,255,195,.08);
  border:1px solid rgba(0,255,195,.15);
}

.total-box p{
  color:#94a3b8;
  margin-bottom:8px;
}

.total-box h2{
  color:#00ffc3;
  font-size:2rem;
}

.actions{
  display:flex;
  gap:12px;
}

.back-btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#1f2937;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.back-btn:hover{
  background:#374151;
}

#payBtn{
  flex:2;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#00ffc3;
  color:black;
  font-weight:700;
  font-size:1rem;
  cursor:pointer;
  transition:.3s;
}

#payBtn:hover{
  transform:translateY(-2px);
}

#payBtn:disabled{
  opacity:.7;
  cursor:not-allowed;
}

@media(max-width:600px){

  .payment-box{
    padding:25px;
  }

  .actions{
    flex-direction:column;
  }

  .detail-row{
    flex-direction:column;
    gap:5px;
    text-align:center;
  }

}
</style>
</head>

<body>

<div class="payment-box">

  <h1>💳 Payment Summary</h1>

  <div id="paymentDetails">
    Loading booking details...
  </div>

  <div class="total-box">
    <p>Total Amount</p>
    <h2 id="paymentTotal">₹0</h2>
  </div>

  <div class="actions">
    <button class="back-btn" onclick="history.back()">
      ← Back
    </button>

    <button id="payBtn">
      Pay Now →
    </button>
  </div>

</div>

<script>

const booking = JSON.parse(
  localStorage.getItem("pendingPayment")
);

const summary = document.getElementById("paymentDetails");

if (booking) {

  summary.innerHTML = `
    <div class="detail-row">
      <span class="detail-label">👤 Name</span>
      <span class="detail-value">${booking.name}</span>
    </div>

    <div class="detail-row">
      <span class="detail-label">📍 Location</span>
      <span class="detail-value">${booking.location}</span>
    </div>

    <div class="detail-row">
      <span class="detail-label">⚽ Turf</span>
      <span class="detail-value">${booking.turfName}</span>
    </div>

    <div class="detail-row">
      <span class="detail-label">📅 Date</span>
      <span class="detail-value">${booking.date}</span>
    </div>

    <div class="detail-row">
      <span class="detail-label">⏰ Slot</span>
      <span class="detail-value">${booking.slot}</span>
    </div>
  `;

  document.getElementById("paymentTotal").textContent =
    `₹${booking.price}`;

} else {

  summary.innerHTML = `
    <div class="detail-row">
      <span class="detail-value">
        No booking found.
      </span>
    </div>
  `;

}

document.getElementById("payBtn").onclick = () => {

  const btn = document.getElementById("payBtn");

  btn.textContent = "Processing...";
  btn.disabled = true;

  setTimeout(() => {

    const bookings = JSON.parse(
      localStorage.getItem("bookings") || "[]"
    );

    bookings.push({
      ...booking,
      time:new Date().toLocaleString()
    });

    localStorage.setItem(
      "bookings",
      JSON.stringify(bookings)
    );

    localStorage.removeItem(
      "pendingPayment"
    );

    window.location.href = "success.html";

  },1500);

};

</script>

</body>
</html>
