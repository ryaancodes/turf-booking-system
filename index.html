<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Turf It Up | Turf Booking System</title>

<link rel="stylesheet" href="style.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

:root{
  --green:#054d2f;
  --accent:#00ffc3;
  --white:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Outfit',sans-serif;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

.bg-video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(5,77,47,.72);
  z-index:-1;
}

/* NAVBAR */

.navbar{
  width:100%;
  padding:25px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  font-size:1.5rem;
  font-weight:800;
  color:var(--accent);
}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  text-decoration:none;
  color:white;
  opacity:.85;
  transition:.3s;
  font-weight:600;
}

.nav-links a:hover{
  opacity:1;
}

/* HERO */

.hero{
  min-height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:5rem;
  font-weight:800;
  color:var(--accent);
  margin-bottom:15px;
}

.hero p{
  max-width:750px;
  font-size:1.3rem;
  line-height:1.6;
  color:#ecfdf5;
}

.features{
  display:flex;
  gap:15px;
  margin-top:35px;
  flex-wrap:wrap;
  justify-content:center;
}

.feature{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
  padding:12px 18px;
  border-radius:50px;
  backdrop-filter:blur(10px);
}

.start-btn{
  margin-top:40px;
  padding:16px 42px;
  border:none;
  border-radius:50px;
  background:var(--accent);
  color:black;
  font-weight:700;
  font-size:1rem;
  cursor:pointer;
  transition:.3s;
}

.start-btn:hover{
  transform:translateY(-3px);
}

/* FOOTER CREDIT */

.credit{
  position:fixed;
  bottom:12px;
  left:0;
  width:100%;
  text-align:center;
  font-size:0.68rem;
  font-weight:400;
  color:rgba(255,255,255,.38);
}

.credit a{
  color:inherit;
  text-decoration:none;
}

.credit a:hover{
  color:rgba(255,255,255,.55);
}

/* MOBILE */

@media(max-width:768px){

  .navbar{
    padding:20px;
    flex-direction:column;
    gap:15px;
  }

  .hero h1{
    font-size:3rem;
  }

  .hero p{
    font-size:1rem;
  }

  .features{
    gap:10px;
  }

  .credit{
    font-size:0.6rem;
    bottom:8px;
  }
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="videos/vid.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<nav class="navbar">
  <div class="brand">⚽ Turf It Up</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="turf-selection.html">Book Turf</a>
  </div>
</nav>

<section class="hero">

  <h1>Turf It Up</h1>

  <p>
    Book premium football turfs across Mumbai in seconds.
    Choose your location, select your slot and confirm your booking instantly.
  </p>

  <div class="features">
    <div class="feature">⚽ 6 Premium Turfs</div>
    <div class="feature">📅 Instant Booking</div>
    <div class="feature">💳 Quick Payments</div>
    <div class="feature">✅ Instant Confirmation</div>
  </div>

  <a href="turf-selection.html">
    <button class="start-btn">
      Book Now →
    </button>
  </a>

</section>

<p class="credit">
  © 2026
  <a href="https://github.com/ryaancodes" target="_blank">
    Ryaan Devnani
  </a>
  • Turf Booking System
</p>

</body>
</html>
