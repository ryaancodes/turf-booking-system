<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Confirmed | Turf It Up</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Outfit',sans-serif;
  background:#0b1220;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.success-container{
  width:100%;
  max-width:650px;
  background:#111827;
  border:1px solid #1f2937;
  border-radius:24px;
  padding:40px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.success-icon{
  font-size:4rem;
  margin-bottom:15px;
}

.success-container h1{
  color:#00ffc3;
  font-size:2.2rem;
  margin-bottom:15px;
}

.success-subtitle{
  color:#94a3b8;
  margin-bottom:30px;
}

.booking-summary{
  background:#1f2937;
  border-radius:18px;
  padding:20px;
  text-align:left;
  margin-bottom:25px;
}

.booking-row{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.booking-row:last-child{
  border-bottom:none;
}

.booking-label{
  color:#94a3b8;
}

.booking-value{
  font-weight:600;
  color:white;
}

.success-message{
  color:#d1d5db;
  margin-bottom:30px;
  line-height:1.6;
}

.home-btn{
  display:inline-block;
  background:#00ffc3;
  color:black;
  text-decoration:none;
  padding:14px 28px;
  border-radius:14px;
  font-weight:700;
  transition:.3s;
}

.home-btn:hover{
  transform:translateY(-2px);
}

@media(max-width:600px){

  .success-container{
    padding:25px;
  }

  .booking-row{
    flex-direction:column;
    gap:4px;
  }

}
</style>

</head>
<body onload="launchConfetti()">

<div class="success-container">

  <div class="success-icon">🎉</div>

  <h1>Booking Confirmed!</h1>

  <p class="success-subtitle">
    Your turf has been successfully reserved.
  </p>

  <div id="bookingSummary" class="booking-summary">
    Loading booking details...
  </div>

  <p id="successMsg" class="success-message">
    Preparing confirmation...
  </p>

  <a href="index.html" class="home-btn">
    Back to Home →
  </a>

</div>

<script>

function launchConfetti(){

  confetti({
    particleCount:180,
    spread:90,
    origin:{ y:0.6 }
  });

  const booking =
    JSON.parse(localStorage.getItem("bookings") || "[]").pop();

  const summary =
    document.getElementById("bookingSummary");

  if(booking){

    summary.innerHTML = `
      <div class="booking-row">
        <span class="booking-label">👤 Name</span>
        <span class="booking-value">${booking.name}</span>
      </div>

      <div class="booking-row">
        <span class="booking-label">⚽ Turf</span>
        <span class="booking-value">${booking.turfName}</span>
      </div>

      <div class="booking-row">
        <span class="booking-label">📍 Location</span>
        <span class="booking-value">${booking.location}</span>
      </div>

      <div class="booking-row">
        <span class="booking-label">📅 Date</span>
        <span class="booking-value">${booking.date}</span>
      </div>

      <div class="booking-row">
        <span class="booking-label">⏰ Slot</span>
        <span class="booking-value">${booking.slot}</span>
      </div>

      <div class="booking-row">
        <span class="booking-label">💰 Amount Paid</span>
        <span class="booking-value">₹${booking.price}</span>
      </div>
    `;

    document.getElementById("successMsg").textContent =
      `${booking.name}, your booking at ${booking.turfName} has been confirmed successfully. We look forward to seeing you on the field.`;

  }else{

    summary.innerHTML = `
      <div style="text-align:center;">
        No booking details available.
      </div>
    `;

    document.getElementById("successMsg").textContent =
      "Your booking was completed successfully.";

  }
}

</script>

</body>
</html>
